name: release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npx changeset version
        env:
          # Auth to npm is via OIDC trusted publishing (configured on
          # npmjs.com against this repo + workflow). The `id-token: write`
          # permission above lets npm CLI mint the short-lived token at
          # publish time. No NPM_TOKEN secret required.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
